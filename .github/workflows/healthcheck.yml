name: Periodic Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Runs once every hour

jobs:
  periodic_health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the live deployment URL
        uses: jasonmanning/url-health-check@v1.0.0
        with:
          url: ${{ secrets.RENDER_PRODUCTION_URL }} # Or paste your raw URL directly
          follow-redirect: false
          max-attempts: 3
          retry-delay: 5s